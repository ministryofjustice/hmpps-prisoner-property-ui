services:

  prisoner-property-db:
    image: postgres:18
    networks:
      - hmpps
    container_name: prisoner-property-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=prisoner_property
      - POSTGRES_USER=prisoner_property
      - POSTGRES_DB=prisoner-property
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prisoner_property -d prisoner-property"]
      interval: 5s
      timeout: 5s
      retries: 10

  locations-inside-prison-db:
    image: postgres
    networks:
      - hmpps
    container_name: locations-inside-prison-db
    restart: unless-stopped
    ports:
      - "5436:5432"
    environment:
      - POSTGRES_PASSWORD=locations_inside_prison
      - POSTGRES_USER=locations_inside_prison
      - POSTGRES_DB=locations_inside_prison
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locations_inside_prison -d locations_inside_prison"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-db:
    image: postgres:18
    container_name: auth-db
    restart: always
    networks:
      - hmpps
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_PASSWORD=admin_password
      - POSTGRES_USER=admin
      - POSTGRES_DB=auth-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d auth-db"]
      interval: 5s
      timeout: 5s
      retries: 10

  manage-users-db:
    image: postgres:18
    container_name: manage-users-db
    restart: always
    networks:
      - hmpps
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_PASSWORD=admin_password
      - POSTGRES_USER=admin
      - POSTGRES_DB=manage-users-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d manage-users-db"]
      interval: 5s
      timeout: 5s
      retries: 10

  prison-register-db:
    image: postgres:18
    networks:
      - hmpps
    container_name: prison-register-db
    restart: always
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_PASSWORD=prison-register
      - POSTGRES_USER=prison-register
      - POSTGRES_DB=prison-register
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prison-register -d prison-register"]
      interval: 5s
      timeout: 5s
      retries: 10

  hmpps-auth:
    image: ghcr.io/ministryofjustice/hmpps-auth:latest
    networks:
      - hmpps
    container_name: hmpps-auth
    depends_on:
      auth-db:
        condition: service_healthy
    ports:
      - "9090:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=dev,local-postgres,manage-users-api,nomis
      - DELIUS_ENDPOINT_URL=http://wiremock:8080/delius
      - MANAGE_USERS_API_ENDPOINT_URL=http://hmpps-manage-users-api:8080
      - NOMIS_ENDPOINT_URL=http://nomis-user-roles-api:8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://auth-db:5432/auth-db
      - HOSTNAME=hmpps-auth
      - APPLICATION_AUTHENTICATION_UI_ALLOWLIST=0.0.0.0/0

  nomis-user-roles-api:
    image: ghcr.io/ministryofjustice/nomis-user-roles-api:latest
    container_name: nomis-user-roles-api
    networks:
      - hmpps
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=dev
      - API_BASE_URL_OAUTH=http://hmpps-auth:8080/auth

  manage-users-api:
    image: ghcr.io/ministryofjustice/hmpps-manage-users-api:latest
    container_name: manage-users-api
    networks:
      - hmpps
    depends_on:
      hmpps-auth:
        condition: service_healthy
      nomis-user-roles-api:
        condition: service_healthy
      manage-users-db:
        condition: service_healthy
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=dev,local-docker
      - HMPPS_AUTH_ENDPOINT_URL=http://hmpps-auth:8080/auth
      - HMPPS_AUTH_EXTERNAL_ENDPOINT_URL=http://localhost:8080/auth
      - NOMIS_ENDPOINT_URL=http://nomis-user-roles-api:8080
      - AUTHORIZATION_SERVER_TOKEN_ENDPOINT_URL=http://hmpps-auth:8080/auth/oauth/token
      - SPRING_DATASOURCE_URL=jdbc:postgresql://manage-users-db:5432/manage-users-db
      - HMPPS_SQS_LOCALSTACK_URL=http://localstack:4566

  prison-register:
    image: ghcr.io/ministryofjustice/prison-register:latest
    container_name: prison-register
    ports:
      - "8084:8080"
    depends_on:
      hmpps-auth:
        condition: service_healthy
      prison-register-db:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - hmpps
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=dev
      - API_BASE_URL_OAUTH=http://hmpps-auth:8080/auth
      - SPRING_DATASOURCE_URL=jdbc:postgresql://prison-register-db:5432/prison-register?sslmode=prefer
      - HMPPS_SQS_LOCALSTACK_URL=http://localstack:4566

  locations-inside-prison-api:
    image: ghcr.io/ministryofjustice/hmpps-locations-inside-prison-api:latest
    container_name: locations-inside-prison-api
    depends_on:
      hmpps-auth:
        condition: service_healthy
      locations-inside-prison-db:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - hmpps
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=seed
      - API_BASE_URL_OAUTH=http://hmpps-auth:8080/auth
      - API_BASE_URL_PRISONER_SEARCH=http://prisoner-search:8080
      - API_BASE_URL_PRISON_REGISTER=http://prison-register:8080
      - API_BASE_URL_MANAGE_USERS=http://manage-users-api:8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://locations-inside-prison-db:5432/locations_inside_prison?sslmode=prefer
      - HMPPS_SQS_LOCALSTACK_URL=http://localstack:4566
      - LOCATIONS_INSIDE_PRISON_API_CLIENT_ID=hmpps-locations-inside-prison-api
      - LOCATIONS_INSIDE_PRISON_API_CLIENT_SECRET=clientsecret

  prisoner-property-api:
    image: ghcr.io/ministryofjustice/hmpps-prisoner-property-api:latest
    container_name: prisoner-property-api
    depends_on:
      prisoner-property-db:
        condition: service_healthy
      localstack:
        condition: service_healthy
      hmpps-auth:
        condition: service_healthy
      locations-inside-prison-api:
        condition: service_healthy
    networks:
      - hmpps
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=dev
      - API_BASE_URL_OAUTH=http://hmpps-auth:8080/auth
      - API_BASE_URL_PRISONER_SEARCH=http://prisoner-search:8080
      - API_BASE_URL_PRISON_REGISTER=http://prison-register:8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://prisoner-property-db:5432/prisoner-property?sslmode=prefer
      - HMPPS_SQS_LOCALSTACK_URL=http://localstack:4566
      - PRISONER_PROPERTY_API_CLIENT_ID=hmpps-prisoner-property-api
      - PRISONER_PROPERTY_API_CLIENT_SECRET=clientsecret

  prisoner-search:
    image: wiremock/wiremock:latest
    networks:
      - hmpps
    container_name: prisoner-search
    ports:
      - "8083:8080"
    volumes:
      - ./wiremock:/home/wiremock

  localstack:
    image: localstack/localstack:community-archive
    networks:
      - hmpps
    container_name: localstack
    ports:
      - "4566:4566"
      - "8999:8080"
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs list-queues && awslocal sns list-topics"]
      interval: 10s
      timeout: 10s
      retries: 15
    environment:
      - DEBUG=${DEBUG- }
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "${TMPDIR:-/tmp/localstack}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"

  redis:
    image: 'redis:8.8'
    networks:
      - hmpps
    container_name: redis
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - '6379:6379'

  app:
    build:
      context: .
      args:
        BUILD_NUMBER: "1.0.0"
        GIT_REF: "a1b2c3"
        GIT_BRANCH: main
    network_mode: "host"
    depends_on:
      manage-users-api:
        condition: service_healthy
      hmpps-auth:
        condition: service_healthy
      prisoner-property-api:
        condition: service_healthy
    profiles:
      - include-frontend
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/3000"]
    environment:
      - PRODUCT_ID=DPS136
      - REDIS_ENABLED=false
      - REDIS_HOST=localhost
      - HMPPS_AUTH_EXTERNAL_URL=http://localhost:9090/auth
      - HMPPS_AUTH_URL=http://hmpps-auth:8080/auth
      - PRISONER_PROPERTY_API_URL=http://localhost:8080
      - MANAGE_USERS_API_URL=http://localhost:8082
      - COMPONENT_API_URL=https://frontend-components-dev.hmpps.service.justice.gov.uk
      - DPS_URL=https://dps-dev.prison.service.justice.gov.uk
      - AUTH_CODE_CLIENT_ID=hmpps-prisoner-property
      - AUTH_CODE_CLIENT_SECRET=clientsecret
      - CLIENT_CREDS_CLIENT_ID=hmpps-prisoner-property-system
      - CLIENT_CREDS_CLIENT_SECRET=clientsecret
      - SESSION_SECRET=somesecretvalue
      - TOKEN_VERIFICATION_API_URL=http://hmpps-auth:8080/auth
      - TOKEN_VERIFICATION_ENABLED=false
      - INGRESS_URL=http://localhost:3000
      - NO_HTTPS=true

networks:
  hmpps:
