---
# Per environment values which override defaults in hmpps-prisoner-property-ui/values.yaml

generic-service:
  ingress:
    host: prisoner-property.hmpps.service.justice.gov.uk

  env:
    INGRESS_URL: "https://prisoner-property.hmpps.service.justice.gov.uk"
    HMPPS_AUTH_URL: "https://sign-in.hmpps.service.justice.gov.uk/auth"
    TOKEN_VERIFICATION_API_URL: "https://token-verification-api.prison.service.justice.gov.uk"
    PRISONER_PROPERTY_API_URL: 'https://prisoner-property-api.hmpps.service.justice.gov.uk'
    MANAGE_USERS_API_URL: 'https://manage-users-api.hmpps.service.justice.gov.uk'
    COMPONENT_API_URL: 'https://frontend-components.hmpps.service.justice.gov.uk'
    DPS_URL: 'https://prisoner.hmpps.service.justice.gov.uk'
    PRISON_API_URL: 'https://prison-api.hmpps.service.justice.gov.uk'
    PRISONER_SEARCH_API_URL: 'https://prisoner-search.prison.service.justice.gov.uk'
    AUDIT_ENABLED: "false"

generic-prometheus-alerts:
  alertSeverity: move-a-prisoner-alerts-prod
