---
# Per environment values which override defaults in hmpps-prisoner-property-ui/values.yaml

generic-service:
  replicaCount: 2

  ingress:
    host: prisoner-property-preprod.hmpps.service.justice.gov.uk

  env:
    INGRESS_URL: "https://prisoner-property-preprod.hmpps.service.justice.gov.uk"
    HMPPS_AUTH_URL: "https://sign-in-preprod.hmpps.service.justice.gov.uk/auth"
    TOKEN_VERIFICATION_API_URL: "https://token-verification-api-preprod.prison.service.justice.gov.uk"
    PRISONER_PROPERTY_API_URL: 'https://prisoner-property-api-preprod.hmpps.service.justice.gov.uk'
    ENVIRONMENT_NAME: PRE-PRODUCTION
    AUDIT_ENABLED: "false"

generic-prometheus-alerts:
  alertSeverity: move-a-prisoner-alerts-nonprod
